<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiken</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="titlebar.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">Go-to-Bed Statistics</div>
    <div class="titlebar-controls">
      <button class="titlebar-button" id="minimize-btn" title="Minimize">−</button>
      <button class="titlebar-button titlebar-close" id="close-btn" title="Close">×</button>
    </div>
  </div>
  
  <div class="window-content">
  <div class="container">
    <h1>Statistics</h1>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalReminders">0</div>
        <div class="stat-label">Total reminders</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-number" id="dismissed">0</div>
        <div class="stat-label">Complied ✓</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-number" id="snoozed">0</div>
        <div class="stat-label">Snoozed ⏰</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-number" id="complianceRate">0%</div>
        <div class="stat-label">Compliance Rate</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Activity</h2>
      <div class="history-list" id="historyList">
        <div class="empty-state">No activity yet</div>
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-secondary" onclick="window.close()">Close</button>
    </div>
  </div>
  </div>

  <script src="titlebar.js"></script>
  <script src="stats.js"></script>
</body>
</html>
