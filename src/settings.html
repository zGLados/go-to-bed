<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="titlebar.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-title">Go-to-Bed Settings</div>
    <div class="titlebar-controls">
      <button class="titlebar-button" id="minimize-btn" title="Minimize">−</button>
      <button class="titlebar-button titlebar-close" id="close-btn" title="Close">×</button>
    </div>
  </div>
  
  <div class="window-content">
  <div class="container">
    <h1>Settings</h1>
    
    <div class="section">
      <label class="switch-label">
        <input type="checkbox" id="enabled" class="toggle-switch">
        <span class="toggle-slider"></span>
        <span class="label-text">Enable reminders</span>
      </label>
    </div>

    <div class="section">
      <label class="switch-label">
        <input type="checkbox" id="autostart" class="toggle-switch">
        <span class="toggle-slider"></span>
        <span class="label-text">Start with Windows</span>
      </label>
    </div>

    <div class="section">
      <label for="bedtime">
        <strong>Bedtime</strong>
      </label>
      <input type="time" id="bedtime" class="time-input">
    </div>

    <div class="section">
      <label>
        <strong>Active Weekdays</strong>
      </label>
      <div class="weekdays">
        <label class="weekday-btn">
          <input type="checkbox" value="1" class="weekday-checkbox">
          <span>Mon</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="2" class="weekday-checkbox">
          <span>Tue</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="3" class="weekday-checkbox">
          <span>Wed</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="4" class="weekday-checkbox">
          <span>Thu</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="5" class="weekday-checkbox">
          <span>Fri</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="6" class="weekday-checkbox">
          <span>Sat</span>
        </label>
        <label class="weekday-btn">
          <input type="checkbox" value="0" class="weekday-checkbox">
          <span>Sun</span>
        </label>
      </div>
      <div class="quick-select">
        <button type="button" class="quick-btn" onclick="selectWeekdays([1,2,3,4,5])">Weekdays</button>
        <button type="button" class="quick-btn" onclick="selectWeekdays([0,6])">Weekend</button>
        <button type="button" class="quick-btn" onclick="selectWeekdays([0,1,2,3,4,5,6])">All</button>
      </div>
    </div>

    <div class="section">
      <label for="snoozeMinutes">
        <strong>Snooze Duration (minutes)</strong>
      </label>
      <input type="number" id="snoozeMinutes" min="1" max="60" class="number-input">
    </div>

    <div class="button-group">
      <button type="button" class="btn btn-primary" onclick="saveSettings()">💾 Save</button>
      <button type="button" class="btn btn-secondary" onclick="window.close()">Cancel</button>
    </div>

    <div id="message" class="message"></div>
  </div>
  </div>

  <script src="titlebar.js"></script>
  <script src="settings.js"></script>
</body>
</html>
