name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: go-to-bed-linux-amd64
          - goos: linux
            goarch: arm64
            output: go-to-bed-linux-arm64
          - goos: darwin
            goarch: amd64
            output: go-to-bed-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: go-to-bed-darwin-arm64
          - goos: windows
            goarch: amd64
            output: go-to-bed-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.output }} .

      - name: Create release package
        run: |
          mkdir -p release
          cp ${{ matrix.output }} release/
          cp configure.sh release/
          cp configure.ps1 release/
          cp install.sh release/
          cp config.example release/
          chmod +x release/*.sh
          cd release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ../go-to-bed-${{ matrix.goos }}-${{ matrix.goarch }}.zip *
          else
            tar czf ../go-to-bed-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz *
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-to-bed-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            go-to-bed-*.tar.gz
            go-to-bed-*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
