name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev gcc-aarch64-linux-gnu

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          go build -o go-to-bed-linux-${{ matrix.goarch }} .

      - name: Create release package
        run: |
          mkdir -p release
          cp go-to-bed-linux-${{ matrix.goarch }} release/
          cp configure.sh release/
          cp install.sh release/
          cp config.example release/
          chmod +x release/*.sh
          cd release
          tar czf ../go-to-bed-linux-${{ matrix.goarch }}.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-to-bed-linux-${{ matrix.goarch }}
          path: go-to-bed-linux-${{ matrix.goarch }}.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -o go-to-bed-darwin-${{ matrix.goarch }} .

      - name: Create release package
        run: |
          mkdir -p release
          cp go-to-bed-darwin-${{ matrix.goarch }} release/
          cp configure.sh release/
          cp config.example release/
          chmod +x release/*.sh release/go-to-bed-darwin-${{ matrix.goarch }}
          cd release
          tar czf ../go-to-bed-darwin-${{ matrix.goarch }}.tar.gz *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-to-bed-darwin-${{ matrix.goarch }}
          path: go-to-bed-darwin-${{ matrix.goarch }}.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          go build -o go-to-bed-windows-amd64.exe .

      - name: Create release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item go-to-bed-windows-amd64.exe release/
          Copy-Item configure.ps1 release/
          Copy-Item config.example release/
          Compress-Archive -Path release/* -DestinationPath go-to-bed-windows-amd64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-to-bed-windows-amd64
          path: go-to-bed-windows-amd64.zip

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
